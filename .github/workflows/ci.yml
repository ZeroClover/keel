name: CI

on:
  push:
    branches: [master]
    tags: ["*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Run tests
        run: make test

  lint-ui:
    name: Lint UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "16"
          cache: yarn
          cache-dependency-path: ui/yarn.lock

      - name: Install dependencies
        working-directory: ui
        run: yarn

      - name: Lint
        working-directory: ui
        run: yarn run lint --no-fix

  docker:
    name: Build Docker Image
    needs: [test, lint-ui]
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      packages: write
    with:
      output: image
      push: ${{ github.event_name != 'pull_request' }}
      platforms: linux/amd64,linux/arm64
      distribute: true
      setup-qemu: false
      runner: |
        default=ubuntu-24.04
        linux/arm64=ubuntu-24.04-arm
      cache: true
      cache-scope: docker
      cache-mode: max
      sign: "false"
      sbom: false
      set-meta-labels: true
      meta-images: ghcr.io/${{ github.repository }}
      meta-tags: |
        type=ref,event=branch
        type=ref,event=tag
        type=semver,pattern={{version}}
        type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  verify-docker-manifest:
    name: Verify Docker Manifest
    needs: docker
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published tags
        shell: bash
        env:
          META_JSON: ${{ needs.docker.outputs.meta-json }}
        run: |
          set -euo pipefail

          mapfile -t tags < <(jq -r '.tags[]' <<<"$META_JSON")
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "No Docker tags were produced by metadata generation"
            exit 1
          fi

          for tag in "${tags[@]}"; do
            echo "Inspecting $tag"
            manifest="$(docker buildx imagetools inspect "$tag" --format '{{json .Manifest}}')"
            jq -e '
              any(.manifests[]?; .platform.os == "linux" and .platform.architecture == "amd64")
            ' <<<"$manifest" >/dev/null
            jq -e '
              any(.manifests[]?; .platform.os == "linux" and .platform.architecture == "arm64")
            ' <<<"$manifest" >/dev/null
          done

  chart-release:
    name: Release Helm Chart
    needs: verify-docker-manifest
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5.0.0

      - name: Compute version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Sync Chart.yaml to release version
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" chart/keel/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: ${VERSION}/" chart/keel/Chart.yaml

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: chart
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
